<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAYSTER PRO</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;}
.container{max-width:500px;margin:auto;padding:20px;}
h1{color:gold;}
h2{color:gold;margin-top:30px;}
.card{background:#111;padding:15px;border-radius:10px;margin:10px 0;}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;background:#111;color:#fff;}
button{width:100%;padding:14px;border:none;border-radius:10px;background:gold;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h1>Ремонт квартир у Львові під ключ</h1>

<h2>Послуги</h2>
<div class="card">Косметичний ремонт</div>
<div class="card">Капітальний ремонт</div>
<div class="card">Сантехніка</div>
<div class="card">Електрика</div>

<h2>Залишити заявку</h2>

<form id="form">
<input name="name" placeholder="Ім'я" required>
<input name="phone" placeholder="Телефон / Telegram">
<select name="service">
<option>Оберіть послугу</option>
<option>Косметичний ремонт</option>
<option>Капітальний ремонт</option>
<option>Сантехніка</option>
<option>Електрика</option>
</select>
<input name="district" placeholder="Район">
<textarea name="message" placeholder="Що потрібно зробити"></textarea>
<button>Отримати кошторис</button>
</form>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let name = form.name.value;
let phone = form.phone.value;
let service = form.service.value;
let district = form.district.value;
let message = form.message.value;

let text = `📥 Нова заявка
👤 ${name}
📞 ${phone}
🛠 ${service}
📍 ${district}
📝 ${message}`;

// 👉 ВСТАВ СВІЙ ТОКЕН СЮДИ
let token = "ТУТ_ТВОЙ_ТОКЕН";

// 👉 ТУТ ТВОЙ CHAT ID
let chat_id = "7461874774";

fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:chat_id,
text:text
})
});

alert("Заявка відправлена");
});
</script>

</body>
</html>
